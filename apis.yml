aid: stainless-api
name: Stainless
description: >-
  Stainless is a New York-based developer-tools company that turns an OpenAPI
  specification into a portfolio of high-quality, idiomatic SDKs, reference
  documentation, MCP servers, CLIs, and Terraform providers. The platform was
  founded by veterans of Stripe, Heroku, and Twilio with the explicit goal of
  bringing Stripe-quality developer experience to any API, and is used by
  AI-platform and infrastructure companies including OpenAI, Anthropic, Google
  DeepMind, Cloudflare, Modern Treasury, Perplexity, Replicate, LangChain,
  Beeper, and Runway. Stainless supports nine target languages today
  (TypeScript, Python, Go, Java, Kotlin, Ruby, PHP, C#, plus a CLI) and
  publishes generated code under the Apache 2.0 license into customer-owned
  GitHub repositories. The company exposes its own platform as a REST API at
  api.stainless.com (v0), with endpoints for managing organizations, projects,
  branches, builds, and the current user, plus a build-compare endpoint and
  matching client libraries. Stainless also ships the Stainless Studio
  (web-based config UI), the Stainless CLI, a Language Server, GitHub member
  sync, breaking-change detection, SSO, audit logs, and integrations with
  documentation hosts (Bump.sh, GitBook, Mintlify, ReadMe).
